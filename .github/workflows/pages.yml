name: Deploy to GitHub Pages

on:
  push:
    branches:
      - deploy-gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: cd 备份vercel && pnpm install

      - name: Build Next.js static export
        run: cd 备份vercel && pnpm exec next build

      - name: Prepare GitHub Pages artifact
        run: |
          rm -rf 备份vercel/out
          mkdir -p 备份vercel/out
          cp -a 备份vercel/.next/server/app/. 备份vercel/out/
          mkdir -p 备份vercel/out/_next/static
          cp -a 备份vercel/.next/static/. 备份vercel/out/_next/static/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v1
        with:
          path: 备份vercel/out

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/download-pages-artifact@v1
      - uses: actions/deploy-pages@v1
