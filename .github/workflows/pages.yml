name: Deploy to GitHub Pages

on:
  push:
    branches:
      - deploy-gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: cd 备份vercel && pnpm install

      - name: Build Next.js static export
        run: cd 备份vercel && pnpm exec next build

      - name: Prepare GitHub Pages artifact
        run: |
          rm -rf 备份vercel/out
          mkdir -p 备份vercel/out
          cp -a 备份vercel/.next/server/app/. 备份vercel/out/
          mkdir -p 备份vercel/out/_next/static
          cp -a 备份vercel/.next/static/. 备份vercel/out/_next/static/
          touch 备份vercel/out/.nojekyll

      - name: Deploy to GitHub Pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./备份vercel/out
          publish_branch: gh-pages
          keep_files: true
          force_orphan: true
          allow_empty_commit: true
