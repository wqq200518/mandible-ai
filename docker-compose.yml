version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cbct-backend
    environment:
      PORT: 8000
      HOST: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      IMAGES_PATH: /app/uploads/images
      MODELS_PATH: /app/uploads/models
      AI_MODEL_PATH: /app/ai-models
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./ai-models:/app/ai-models
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbct-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: always

volumes:
  backend-uploads:
  ai-models:
